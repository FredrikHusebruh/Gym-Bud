name: Deploy to Azure!

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      RG: GymBudRG
      ACR_NAME: ${{ secrets.AZURE_REGISTRY_NAME }}
      ACR_SERVER: ${{ secrets.AZURE_REGISTRY_NAME }}.azurecr.io
      BACKEND_IMAGE: ${{ secrets.AZURE_REGISTRY_NAME }}.azurecr.io/budapi:${{ github.sha }}
      FRONTEND_IMAGE: ${{ secrets.AZURE_REGISTRY_NAME }}.azurecr.io/budapp:${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_SERVER }}
          username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./Bud/Bud.Api
          push: true
          tags: ${{ env.BACKEND_IMAGE }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./Bud/BudApp
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}
          build-args: |
            VITE_API_URL=${{ secrets.BACKEND_URL }}

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Configure registry credentials
        run: |
          ACR_PASS=$(az acr credential show --name $ACR_NAME --query "passwords[0].value" -o tsv)
          az containerapp registry set -n budapi -g $RG \
            --server $ACR_SERVER \
            --username "$ACR_NAME" \
            --password "$ACR_PASS"
          az containerapp registry set -n budapp -g $RG \
            --server $ACR_SERVER \
            --username "$ACR_NAME" \
            --password "$ACR_PASS"

      - name: Deploy backend
        run: |
          az containerapp update \
            --name budapi \
            --resource-group $RG \
            --image $BACKEND_IMAGE

      - name: Deploy frontend
        run: |
          az containerapp update \
            --name budapp \
            --resource-group $RG \
            --image $FRONTEND_IMAGE
