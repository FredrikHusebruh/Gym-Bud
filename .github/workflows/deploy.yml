name: Deploy to Azure

on:
  push:
    branches:
      - main

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    env:
      RG: GymBudRG
      ACR_NAME: ${{ secrets.AZURE_REGISTRY_NAME }}
      BACKEND_APP_NAME: budapi

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and deploy backend
        uses: azure/container-apps-deploy-action@v1
        with:
          appSourcePath: ${{ github.workspace }}/Bud/Bud.Api
          dockerfilePath: Dockerfile
          acrName: ${{ env.ACR_NAME }}
          containerAppName: ${{ env.BACKEND_APP_NAME }}
          resourceGroup: ${{ env.RG }}
          imageToBuild: ${{ env.ACR_NAME }}.azurecr.io/budapi:${{ github.sha }}

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend

    env:
      RG: GymBudRG
      ACR_NAME: ${{ secrets.AZURE_REGISTRY_NAME }}
      FRONTEND_APP_NAME: budapp

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and deploy frontend
        uses: azure/container-apps-deploy-action@v1
        with:
          appSourcePath: ${{ github.workspace }}/Bud/BudApp
          dockerfilePath: ${{ github.workspace }}/Bud/BudApp/Dockerfile
          acrName: ${{ env.ACR_NAME }}
          containerAppName: ${{ env.FRONTEND_APP_NAME }}
          resourceGroup: ${{ env.RG }}
          imageToBuild: ${{ env.ACR_NAME }}.azurecr.io/budapp:${{ github.sha }}
          buildArguments: |
            VITE_API_URL=${{ secrets.BACKEND_URL }}
