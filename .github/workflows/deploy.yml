name: Deploy to Azure!

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.AZURE_REGISTRY_NAME }}.azurecr.io
          username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./Bud/Bud.Api
          push: true
          tags: ${{ secrets.AZURE_REGISTRY_NAME }}.azurecr.io/budapi:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./Bud/BudApp
          push: true
          tags: ${{ secrets.AZURE_REGISTRY_NAME }}.azurecr.io/budapp:latest
          build-args: |
            VITE_API_URL=${{ secrets.BACKEND_URL }}

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy backend
        uses: azure/container-apps-deploy-action@v1
        with:
          imageToDeploy: ${{ secrets.AZURE_REGISTRY_NAME }}.azurecr.io/budapi:latest
          resourceGroup: GymBudRG
          containerAppName: budapi
          registryUrl: ${{ secrets.AZURE_REGISTRY_NAME }}.azurecr.io
          registryUsername: ${{ secrets.AZURE_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.AZURE_REGISTRY_PASSWORD }}

      - name: Deploy frontend
        uses: azure/container-apps-deploy-action@v1
        with:
          imageToDeploy: ${{ secrets.AZURE_REGISTRY_NAME }}.azurecr.io/budapp:latest
          resourceGroup: GymBudRG
          containerAppName: budapp
          registryUrl: ${{ secrets.AZURE_REGISTRY_NAME }}.azurecr.io
          registryUsername: ${{ secrets.AZURE_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.AZURE_REGISTRY_PASSWORD }}
