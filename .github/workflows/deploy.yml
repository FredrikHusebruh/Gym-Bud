name: Deploy to Azure!

on:
  push:
    branches: [main]

env:
  RG: GymBudRG
  ACR_NAME: ${{ secrets.AZURE_REGISTRY_NAME }}

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Fix registry secret with correct password
        run: |
          ACR_PASS=$(az acr credential show --name $ACR_NAME --query "passwords[0].value" -o tsv)
          az containerapp secret set --name budapi --resource-group $RG \
            --secrets "gymbudazurecrio-${ACR_NAME}=$ACR_PASS"

      - name: Build and deploy backend
        uses: azure/container-apps-deploy-action@v1
        with:
          appSourcePath: ${{ github.workspace }}/Bud/Bud.Api
          dockerfilePath: Dockerfile
          acrName: ${{ secrets.AZURE_REGISTRY_NAME }}
          acrUsername: ${{ secrets.AZURE_REGISTRY_USERNAME }}
          acrPassword: ${{ secrets.AZURE_REGISTRY_PASSWORD }}
          containerAppName: budapi
          resourceGroup: GymBudRG
          imageToBuild: ${{ secrets.AZURE_REGISTRY_NAME }}.azurecr.io/budapi:${{ github.sha }}

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Fix registry secret with correct password
        run: |
          ACR_PASS=$(az acr credential show --name $ACR_NAME --query "passwords[0].value" -o tsv)
          az containerapp secret set --name budapp --resource-group $RG \
            --secrets "gymbudazurecrio-${ACR_NAME}=$ACR_PASS"

      - name: Build and deploy frontend
        uses: azure/container-apps-deploy-action@v1
        with:
          appSourcePath: ${{ github.workspace }}/Bud/BudApp
          dockerfilePath: Dockerfile
          acrName: ${{ secrets.AZURE_REGISTRY_NAME }}
          acrUsername: ${{ secrets.AZURE_REGISTRY_USERNAME }}
          acrPassword: ${{ secrets.AZURE_REGISTRY_PASSWORD }}
          containerAppName: budapp
          resourceGroup: GymBudRG
          imageToBuild: ${{ secrets.AZURE_REGISTRY_NAME }}.azurecr.io/budapp:${{ github.sha }}
          buildArguments: VITE_API_URL=${{ secrets.BACKEND_URL }}
