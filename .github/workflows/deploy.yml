name: Deploy to Azure!!

on:
  push:
    branches: [main]

env:
  RG: GymBudRG
  ACR_NAME: ${{ secrets.AZURE_REGISTRY_NAME }}

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.AZURE_REGISTRY_NAME }}.azurecr.io
          username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ${{ github.workspace }}/Bud/Bud.Api
          file: ${{ github.workspace }}/Bud/Bud.Api/Dockerfile
          push: true
          tags: ${{ secrets.AZURE_REGISTRY_NAME }}.azurecr.io/budapi:${{ github.sha }}

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy backend
        run: |
          az containerapp update --name budapi --resource-group $RG \
            --image ${ACR_NAME}.azurecr.io/budapi:${{ github.sha }}

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.AZURE_REGISTRY_NAME }}.azurecr.io
          username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ${{ github.workspace }}/Bud/BudApp
          file: ${{ github.workspace }}/Bud/BudApp/Dockerfile
          push: true
          tags: ${{ secrets.AZURE_REGISTRY_NAME }}.azurecr.io/budapp:${{ github.sha }}
          build-args: |
            VITE_API_URL=${{ secrets.BACKEND_URL }}
            VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
            VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy frontend
        run: |
          az containerapp update --name budapp --resource-group $RG \
            --image ${ACR_NAME}.azurecr.io/budapp:${{ github.sha }}
